services:
  coolqbot:
    image: he0119/coolqbot
    container_name: coolqbot
    restart: always
    volumes:
      - "./data:/app/data"
    ports:
      - "8080:8080"
    env_file:
      - ".env"
    depends_on:
      playwright:
        condition: service_healthy

  rsshub:
    image: diygod/rsshub
    container_name: rsshub
    restart: always

  playwright:
    image: jacoblincool/playwright:chromium-server-1.61.1
    container_name: playwright
    restart: always
    ports:
      - "53333:53333"
    command:
      - node
      - -e
      - |
        const { chromium } = require("playwright-core");

        (async () => {
          const server = await chromium.launchServer({
            host: "0.0.0.0",
            port: Number(process.env.BROWSER_PORT || 53333),
            wsPath: process.env.BROWSER_WS_ENDPOINT || "/playwright",
          });
          console.log(server.wsEndpoint());
        })();
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:53333/playwright"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
